# Llama-3.2-1B on Alpaca-1k: sweep dp_epsilon ∈ {null, 1.0, 4.0}.
# null = DP off; 1.0 = strong DP; 4.0 = relaxed DP.
# Measures the privacy-utility tradeoff at fixed clients/rank.
# 3 eps × 3 seeds × 2 strategies = 18 runs ≈ 3 GPU-hr.
#
# !!! DO NOT RUN BEFORE ISSUE #20 LANDS !!!
# As of PR #18, chorus/eval/runner.py:EvalRunner does NOT apply
# EvalConfig.dp_epsilon / dp_delta / dp_max_norm — no noise is added at any
# epsilon value, so all three arms of this sweep would currently produce
# identical numbers. Publishing those as a real DP ablation would be straight-up
# fabricated data. Issue #20 tracks the runner-side noise application required
# to make this YAML meaningful, and is a blocker for the v0.2.0 benchmark-results
# PR. Remove this warning once #20 closes.

model_id: meta-llama/Llama-3.2-1B
dataset:
  name: tatsu-lab/alpaca
  split: train
  max_examples: 1000
num_clients: 10
num_rounds: 5
strategies: [fedavg, fedex-lora]
rank: 8
seeds: [0, 1, 2]
max_steps_per_round: 200
eval_batch_size: 4
target_modules: [q_proj, v_proj]
partition: iid
dp_delta: 1.0e-5
dp_max_norm: 1.0
sweep:
  dp_epsilon: [null, 1.0, 4.0]
